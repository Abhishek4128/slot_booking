<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SlotBook — Reserve Your Time</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;700;800&display=swap" rel="stylesheet" />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>

  <!-- ── NAVIGATION ── -->
  <nav id="navbar">
    <div class="logo" onclick="router.go('home')">
      <div class="logo-dot"></div>
      Slot<span>Book</span>
    </div>
    <div class="nav-right" id="navRight"></div>
  </nav>

  <!-- ── TOAST NOTIFICATIONS ── -->
  <div class="toast-wrap" id="toastWrap"></div>

  <!-- ── PAGE OUTLET ── -->
  <main id="app"></main>

  <!-- ── SLOT DETAIL MODAL ── -->
  <div class="overlay" id="slotModal" onclick="ui.handleOverlay(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Slot Details</div>
        <button class="modal-close" onclick="ui.closeModal()">✕</button>
      </div>
      <div id="modalBody"></div>
      <div id="modalActions" style="margin-top:1.5rem;display:flex;gap:0.75rem;"></div>
    </div>
  </div>

  <!-- ── SCRIPTS (order matters) ── -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/slots.js"></script>
  <script src="js/bookings.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
